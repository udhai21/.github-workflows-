name: Tourism Project Pipeline

on:
  push:
    branches:
      - main  # Automatically triggers on push to the main branch

jobs:

  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tourism_project/deployment/requirements.txt
          sudo apt-get update && sudo apt-get install git-lfs
          git lfs install
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python tourism_project/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tourism_project/deployment/requirements.txt
          sudo apt-get update && sudo apt-get install git-lfs
          git lfs install
      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python tourism_project/model_building/data_preparation.py


  model-traning:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tourism_project/deployment/requirements.txt
          sudo apt-get update && sudo apt-get install git-lfs
          git lfs install
      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &  # Run MLflow UI in the background
          sleep 5  # Wait for a moment to let the server starts
      - name: Model Building
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python tourism_project/model_building/model_training.py


  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-traning,data-prep,register-dataset]
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub
          sudo apt-get update && sudo apt-get install git-lfs
          git lfs install
      - name: Push deployment files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: "revathisrihari" # Make sure this matches your Hugging Face username
        run: |
          APP_SPACE_REPO_ID="${{ env.HF_USERNAME }}/tourism-streamlit-app" # Example name for your Streamlit app Space
          APP_SPACE_REPO_TYPE="space"

          # Check if the Space exists and create it if not
          python -c "from huggingface_hub import HfApi, create_repo, RepositoryNotFoundError; api = HfApi(token='${{ secrets.HF_TOKEN }}'); try: api.repo_info(repo_id='${APP_SPACE_REPO_ID}', repo_type='${APP_SPACE_REPO_TYPE}'); print(f'Space ${APP_SPACE_REPO_ID} already exists.'); except RepositoryNotFoundError: print(f'Creating Space ${APP_SPACE_REPO_ID}...'); create_repo(repo_id='${APP_SPACE_REPO_ID}', repo_type='${APP_SPACE_REPO_TYPE}', private=False, token='${{ secrets.HF_TOKEN }}'); print(f'Space ${APP_SPACE_REPO_ID} created.');"

          # Clone the space
          git config --global user.email "you@example.com" # Replace with a valid email for git commits
          git config --global user.name "GitHub Actions"
          git clone "https://${{ env.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${APP_SPACE_REPO_ID}"

          # Copy deployment files to the cloned space repo
          cp -r tourism_project/deployment/* "${APP_SPACE_REPO_ID}/"

          # Commit and push
          cd "${APP_SPACE_REPO_ID}"
          git add .
          git commit -m "Update Streamlit app from GitHub Actions" || echo "No changes to commit"
          git push
          echo "Streamlit app pushed to https://huggingface.co/spaces/${APP_SPACE_REPO_ID}"
